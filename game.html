<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Gaming Game</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #1a1a2e;
            font-family: Arial, sans-serif;
            flex-direction: column;
            gap: 20px;
        }
        canvas {
            border: 3px solid #00d4ff;
            background: #0f0f1e;
            display: block;
        }
        #stats {
            color: #00d4ff;
            font-size: 20px;
            text-align: center;
            min-height: 60px;
        }
        #gameOverScreen {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border: 3px solid #00d4ff;
            text-align: center;
            color: #00d4ff;
            z-index: 1000;
            border-radius: 10px;
        }
        #gameOverScreen h1 {
            font-size: 48px;
            margin: 0 0 20px 0;
        }
        #gameOverScreen p {
            font-size: 20px;
            margin: 10px 0;
        }
        #gameOverScreen button {
            margin-top: 20px;
            padding: 10px 30px;
            font-size: 18px;
            background: #00d4ff;
            color: #0f0f1e;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        #gameOverScreen button:hover {
            background: #00a8cc;
        }
    </style>
</head>
<body>
    <h1 style="color: #00d4ff;">Vibe Gaming</h1>
    <div id="stats">
        <div>Lives: <span id="lives">3</span></div>
        <div>Health: <span id="health">100</span></div>
        <div>Time: <span id="timer">120</span>s</div>
    </div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <div id="gameOverScreen">
        <h1 id="overTitle">Game Over</h1>
        <p id="overMessage">You lost all your lives!</p>
        <button onclick="location.reload()">Play Again</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Game states
        const gameStates = {
            PLAYING: 'playing',
            WON: 'won',
            LOST: 'lost'
        };
        
        // Game variables
        let gameState = gameStates.PLAYING;
        let lives = 3;
        let health = 100;
        let timeRemaining = 120; // 2 minutes
        let score = 0;
        let gameStartTime = Date.now();
        
        // Player
        const player = {
            x: canvas.width / 2,
            y: canvas.height - 50,
            width: 30,
            height: 30,
            speed: 5,
            color: '#00d4ff'
        };
        
        // Pellets array
        let pellets = [];
        
        // Pellet types
        const pelletTypes = {
            RED: 'red',      // -20 health
            BLUE: 'blue'     // +20 health
        };
        
        // Create pellet
        function createPellet() {
            const type = Math.random() > 0.5 ? pelletTypes.RED : pelletTypes.BLUE;
            return {
                x: Math.random() * (canvas.width - 20),
                y: -20,
                width: 15,
                height: 15,
                speed: 4 + Math.random() * 2, // Faster pellets (4-6)
                type: type,
                color: type === pelletTypes.RED ? '#ff3333' : '#3366ff'
            };
        }
        
        // Spawn pellets
        function spawnPellet() {
            if (gameState === gameStates.PLAYING && pellets.length < 15) {
                pellets.push(createPellet());
            }
        }
        
        // Update game
        function update() {
            if (gameState !== gameStates.PLAYING) return;
            
            // Update timer
            const elapsed = Math.floor((Date.now() - gameStartTime) / 1000);
            timeRemaining = Math.max(0, 120 - elapsed);
            
            // Check win condition
            if (timeRemaining <= 0 && lives > 0) {
                gameState = gameStates.WON;
                showGameOver(true);
                return;
            }
            
            // Move player
            if (keys.ArrowLeft && player.x > 0) {
                player.x -= player.speed;
            }
            if (keys.ArrowRight && player.x + player.width < canvas.width) {
                player.x += player.speed;
            }
            if (keys.w && player.y > 0) {
                player.y -= player.speed;
            }
            if (keys.s && player.y + player.height < canvas.height) {
                player.y += player.speed;
            }
            
            // Update pellets
            for (let i = pellets.length - 1; i >= 0; i--) {
                const pellet = pellets[i];
                pellet.y += pellet.speed;
                
                // Check collision with player
                if (checkCollision(player, pellet)) {
                    if (pellet.type === pelletTypes.RED) {
                        health -= 20;
                        lives--;
                    } else if (pellet.type === pelletTypes.BLUE) {
                        health = Math.min(100, health + 20);
                    }
                    pellets.splice(i, 1);
                    
                    if (lives <= 0) {
                        gameState = gameStates.LOST;
                        showGameOver(false);
                    }
                } else if (pellet.y > canvas.height) {
                    // Pellet went off screen
                    pellets.splice(i, 1);
                }
            }
            
            // Clamp health
            health = Math.max(0, Math.min(100, health));
            
            // Spawn new pellets
            if (Math.random() < 0.02) {
                spawnPellet();
            }
        }
        
        // Check collision
        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }
        
        // Draw game
        function draw() {
            // Clear canvas
            ctx.fillStyle = '#0f0f1e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw player
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);
            
            // Draw pellets
            for (const pellet of pellets) {
                ctx.fillStyle = pellet.color;
                ctx.beginPath();
                ctx.arc(pellet.x + pellet.width / 2, pellet.y + pellet.height / 2, pellet.width / 2, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Draw borders
            ctx.strokeStyle = '#00d4ff';
            ctx.lineWidth = 2;
            ctx.strokeRect(0, 0, canvas.width, canvas.height);
        }
        
        // Update UI
        function updateUI() {
            document.getElementById('lives').textContent = lives;
            document.getElementById('health').textContent = health;
            document.getElementById('timer').textContent = timeRemaining;
        }
        
        // Show game over screen
        function showGameOver(won) {
            document.getElementById('gameOverScreen').style.display = 'block';
            const title = document.getElementById('overTitle');
            const message = document.getElementById('overMessage');
            
            if (won) {
                title.textContent = 'You Win!';
                message.textContent = 'You survived 2 minutes! Great job!';
                title.style.color = '#00ff00';
            } else {
                title.textContent = 'Game Over';
                message.textContent = 'You lost all your lives!';
                title.style.color = '#ff3333';
            }
        }
        
        // Keyboard input
        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });
        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });
        
        // Game loop
        function gameLoop() {
            update();
            draw();
            updateUI();
            requestAnimationFrame(gameLoop);
        }
        
        // Start game
        gameLoop();
    </script>
</body>
</html>
