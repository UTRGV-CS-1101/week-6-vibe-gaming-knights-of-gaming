<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Gaming Game</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #1a1a2e;
            font-family: Arial, sans-serif;
            flex-direction: column;
            gap: 20px;
        }
        canvas {
            border: 3px solid #00d4ff;
            background: #0f0f1e;
            display: block;
        }
        #stats {
            color: #00d4ff;
            font-size: 20px;
            text-align: center;
            min-height: 60px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 40px;
            border: 3px solid #00d4ff;
            text-align: center;
            color: #00d4ff;
            z-index: 1000;
            border-radius: 10px;
        }
        .modal h1 {
            font-size: 48px;
            margin: 0 0 20px 0;
        }
        .modal p {
            font-size: 20px;
            margin: 10px 0;
        }
        .modal button {
            margin-top: 20px;
            margin-left: 10px;
            margin-right: 10px;
            padding: 10px 30px;
            font-size: 18px;
            background: #00d4ff;
            color: #0f0f1e;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }
        .modal button:hover {
            background: #00a8cc;
        }
        #modeSelect button {
            display: inline-block;
            min-width: 150px;
        }
        #shields {
            margin-top: 10px;
            font-size: 16px;
        }
        #healthBar {
            width: 400px;
            height: 25px;
            background: #333;
            border: 2px solid #00d4ff;
            position: relative;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 10px;
        }
        #healthBarFill {
            height: 100%;
            background: linear-gradient(90deg, #ff3333, #ffff33, #00ff00);
            width: 100%;
            transition: width 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #000;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h1 style="color: #00d4ff;">Vibe Gaming</h1>
    <div id="stats">
        <div>Lives: <span id="lives">3</span> | Health: <span id="health">100</span> | Time: <span id="timer">120</span>s</div>
        <div id="healthBar">
            <div id="healthBarFill"></div>
        </div>
        <div id="shields" style="display: none;">Shield: <span id="shieldStatus">Ready</span></div>
    </div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <div id="modeSelect" class="modal">
        <h1>Choose Game Mode</h1>
        <p>Select your difficulty</p>
        <button onclick="startGame('normal')">Normal Mode</button>
        <button onclick="startGame('hard')">Hard Mode</button>
    </div>

    <div id="gameOverScreen" class="modal">
        <h1 id="overTitle">Game Over</h1>
        <p id="overMessage">You lost all your lives!</p>
        <button onclick="location.reload()">Play Again</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Game states
        const gameStates = {
            PLAYING: 'playing',
            WON: 'won',
            LOST: 'lost'
        };
        
        // Game modes
        const gameModes = {
            NORMAL: 'normal',
            HARD: 'hard'
        };
        
        // Game variables
        let gameMode = null;
        let gameState = gameStates.PLAYING;
        let lives = 3;
        let health = 100;
        let timeRemaining = 120; // 2 minutes
        let score = 0;
        let gameStartTime = null;
        let gameStarted = false;
        
        // Shield variables (Normal mode only)
        let shieldActive = false;
        let shieldTimeRemaining = 0;
        const SHIELD_DURATION = 5000; // 5 seconds
        const SHIELD_COOLDOWN = 10000; // 10 seconds
        let shieldCooldownRemaining = 0;
        
        // Player
        const player = {
            x: 0,
            y: 0,
            width: 30,
            height: 30,
            speed: 5,
            color: '#00d4ff'
        };
        
        // Initialize player position
        function initPlayer() {
            player.x = canvas.width / 2;
            player.y = canvas.height - 50;
        }
        
        // Pellets array
        let pellets = [];
        
        // Pellet types
        const pelletTypes = {
            RED: 'red',      // -20 health
            BLUE: 'blue'     // +20 health
        };
        
        // Mode settings
        const modeSettings = {
            normal: {
                baseSpeed: 4,
                speedVariation: 2,
                maxPellets: 15,
                spawnRate: 0.02
            },
            hard: {
                baseSpeed: 6,
                speedVariation: 3,
                maxPellets: 25,
                spawnRate: 0.04
            }
        };
        
        // Create pellet
        function createPellet() {
            const type = Math.random() > 0.5 ? pelletTypes.RED : pelletTypes.BLUE;
            const settings = modeSettings[gameMode];
            return {
                x: Math.random() * (canvas.width - 20),
                y: -20,
                width: 15,
                height: 15,
                speed: settings.baseSpeed + Math.random() * settings.speedVariation,
                type: type,
                color: type === pelletTypes.RED ? '#ff3333' : '#3366ff'
            };
        }
        
        // Spawn pellets
        function spawnPellet() {
            const settings = modeSettings[gameMode];
            if (gameState === gameStates.PLAYING && pellets.length < settings.maxPellets) {
                pellets.push(createPellet());
            }
        }
        
        // Activate shield (Normal mode only)
        function activateShield() {
            if (gameMode !== gameModes.NORMAL) return;
            if (shieldActive) return;
            if (shieldCooldownRemaining > 0) return;
            
            shieldActive = true;
            shieldTimeRemaining = SHIELD_DURATION;
        }
        
        // Update game
        function update() {
            if (!gameStarted) return;
            if (gameState !== gameStates.PLAYING) return;
            
            // Update timer
            const elapsed = Date.now() - gameStartTime;
            timeRemaining = Math.max(0, 120 - Math.floor(elapsed / 1000));
            
            // Check win condition
            if (timeRemaining <= 0 && lives > 0) {
                gameState = gameStates.WON;
                showGameOver(true);
                return;
            }
            
            // Update shield
            if (gameMode === gameModes.NORMAL) {
                if (shieldActive) {
                    shieldTimeRemaining -= 16; // ~60fps
                    if (shieldTimeRemaining <= 0) {
                        shieldActive = false;
                        shieldCooldownRemaining = SHIELD_COOLDOWN;
                    }
                }
                if (shieldCooldownRemaining > 0) {
                    shieldCooldownRemaining -= 16;
                }
            }
            
            // Move player
            if (keys.ArrowLeft && player.x > 0) {
                player.x -= player.speed;
            }
            if (keys.ArrowRight && player.x + player.width < canvas.width) {
                player.x += player.speed;
            }
            if (keys.w && player.y > 0) {
                player.y -= player.speed;
            }
            if (keys.s && player.y + player.height < canvas.height) {
                player.y += player.speed;
            }
            
            // Update pellets
            for (let i = pellets.length - 1; i >= 0; i--) {
                const pellet = pellets[i];
                pellet.y += pellet.speed;
                
                // Check collision with player
                if (checkCollision(player, pellet)) {
                    if (shieldActive && gameMode === gameModes.NORMAL) {
                        // Shield protects you
                        shieldActive = false;
                        shieldCooldownRemaining = SHIELD_COOLDOWN;
                        pellets.splice(i, 1);
                    } else if (pellet.type === pelletTypes.RED) {
                        health -= 20;
                        lives--;
                        pellets.splice(i, 1);
                        
                        if (lives <= 0) {
                            gameState = gameStates.LOST;
                            showGameOver(false);
                        }
                    } else if (pellet.type === pelletTypes.BLUE) {
                        health = Math.min(100, health + 20);
                        pellets.splice(i, 1);
                    }
                } else if (pellet.y > canvas.height) {
                    // Pellet went off screen
                    pellets.splice(i, 1);
                }
            }
            
            // Clamp health
            health = Math.max(0, Math.min(100, health));
            
            // Spawn new pellets
            const settings = modeSettings[gameMode];
            if (Math.random() < settings.spawnRate) {
                spawnPellet();
            }
        }
        
        // Check collision
        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }
        
        // Draw game
        function draw() {
            // Clear canvas
            ctx.fillStyle = '#0f0f1e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw player
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);
            
            // Draw shield if active
            if (shieldActive && gameMode === gameModes.NORMAL) {
                ctx.strokeStyle = '#ffff00';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(player.x + player.width / 2, player.y + player.height / 2, 40, 0, Math.PI * 2);
                ctx.stroke();
            }
            
            // Draw pellets
            for (const pellet of pellets) {
                ctx.fillStyle = pellet.color;
                ctx.beginPath();
                ctx.arc(pellet.x + pellet.width / 2, pellet.y + pellet.height / 2, pellet.width / 2, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Draw borders
            ctx.strokeStyle = '#00d4ff';
            ctx.lineWidth = 2;
            ctx.strokeRect(0, 0, canvas.width, canvas.height);
            
            // Draw health bar on canvas
            const barWidth = 200;
            const barHeight = 20;
            const barX = canvas.width - barWidth - 10;
            const barY = 10;
            
            // Health bar background
            ctx.fillStyle = '#333';
            ctx.fillRect(barX, barY, barWidth, barHeight);
            ctx.strokeStyle = '#00d4ff';
            ctx.lineWidth = 2;
            ctx.strokeRect(barX, barY, barWidth, barHeight);
            
            // Health bar fill with color gradient
            const healthPercent = health / 100;
            const fillWidth = barWidth * healthPercent;
            
            if (health > 50) {
                ctx.fillStyle = '#00ff00'; // Green
            } else if (health > 25) {
                ctx.fillStyle = '#ffff00'; // Yellow
            } else {
                ctx.fillStyle = '#ff3333'; // Red
            }
            
            ctx.fillRect(barX, barY, fillWidth, barHeight);
            
            // Health text
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 12px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(`${health}/100`, barX + barWidth / 2, barY + barHeight / 2);
            
            // Draw mode text
            ctx.fillStyle = '#00d4ff';
            ctx.font = '14px Arial';
            ctx.textAlign = 'left';
            ctx.fillText(gameMode === gameModes.NORMAL ? 'Normal Mode' : 'Hard Mode', 10, 20);
        }
        
        // Update UI
        function updateUI() {
            document.getElementById('lives').textContent = lives;
            document.getElementById('health').textContent = health;
            document.getElementById('timer').textContent = timeRemaining;
            
            // Update health bar
            const healthPercent = health;
            const healthBarFill = document.getElementById('healthBarFill');
            healthBarFill.style.width = healthPercent + '%';
            healthBarFill.textContent = health + '/100';
            
            if (gameMode === gameModes.NORMAL) {
                document.getElementById('shields').style.display = 'block';
                let shieldStatus = '';
                if (shieldActive) {
                    shieldStatus = `Active (${Math.ceil(shieldTimeRemaining / 1000)}s)`;
                } else if (shieldCooldownRemaining > 0) {
                    shieldStatus = `Cooldown (${Math.ceil(shieldCooldownRemaining / 1000)}s)`;
                } else {
                    shieldStatus = 'Ready (Press SPACE)';
                }
                document.getElementById('shieldStatus').textContent = shieldStatus;
            }
        }
        
        // Show game over screen
        function showGameOver(won) {
            document.getElementById('gameOverScreen').style.display = 'block';
            const title = document.getElementById('overTitle');
            const message = document.getElementById('overMessage');
            
            if (won) {
                title.textContent = 'You Win!';
                message.textContent = 'You survived 2 minutes! Great job!';
                title.style.color = '#00ff00';
            } else {
                title.textContent = 'Game Over';
                message.textContent = 'You lost all your lives!';
                title.style.color = '#ff3333';
            }
        }
        
        // Start game
        function startGame(mode) {
            gameMode = mode;
            gameState = gameStates.PLAYING;
            lives = 3;
            health = 100;
            timeRemaining = 120;
            pellets = [];
            shieldActive = false;
            shieldTimeRemaining = 0;
            shieldCooldownRemaining = 0;
            
            document.getElementById('modeSelect').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            
            gameStartTime = Date.now();
            gameStarted = true;
            initPlayer();
        }
        
        // Keyboard input
        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            
            // Shield activation
            if (e.key === ' ' && gameMode === gameModes.NORMAL) {
                e.preventDefault();
                activateShield();
            }
        });
        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });
        
        // Game loop
        function gameLoop() {
            update();
            draw();
            updateUI();
            requestAnimationFrame(gameLoop);
        }
        
        // Show mode select at start
        document.getElementById('modeSelect').style.display = 'block';
        gameLoop();
    </script>
</body>
</html>
